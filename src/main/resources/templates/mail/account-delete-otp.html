<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyso Diary 회원탈퇴 인증 코드</title>
</head>
<body style="margin:0; padding:24px; background-color:#f7f8fa; font-family:Arial, sans-serif; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; margin:0 auto; background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;">
    <tr>
        <td style="padding:28px;">
            <h1 style="margin:0 0 16px; font-size:20px; color:#111827;">Heyso Diary 회원탈퇴 인증 코드</h1>
            <p style="margin:0 0 14px; font-size:14px; line-height:1.6;">회원탈퇴 전 본인 확인을 위해 아래 인증 코드를 입력해 주세요.</p>
            <div style="margin:18px 0; padding:14px; background:#f3f4f6; border:1px dashed #9ca3af; border-radius:8px; text-align:center;">
                <span style="font-size:28px; letter-spacing:8px; font-weight:700;" th:text="${otpCode}">1234</span>
            </div>
            <p style="margin:0 0 10px; font-size:14px; line-height:1.6;">
                이 코드는 <strong th:text="${expiresInMinutes}">10</strong>분 후 만료됩니다.
            </p>
            <p style="margin:0; font-size:13px; line-height:1.6; color:#6b7280;">
                본인이 요청하지 않았다면 이 메일을 무시해 주세요.
            </p>
        </td>
    </tr>
</table>
</body>
</html>
