<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heyso Diary 가입 환영</title>
</head>
<body style="margin:0; padding:24px; background-color:#f7f8fa; font-family:Arial, sans-serif; color:#1f2937;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px; margin:0 auto; background:#ffffff; border:1px solid #e5e7eb; border-radius:10px;">
    <tr>
        <td style="padding:28px;">
            <h1 style="margin:0 0 16px; font-size:20px; color:#111827;">Heyso Diary에 오신 것을 환영합니다</h1>
            <p style="margin:0 0 14px; font-size:14px; line-height:1.7;">
                <strong th:text="${nickname}">회원</strong>님, 가입해 주셔서 감사합니다.
            </p>
            <p style="margin:0 0 12px; font-size:14px; line-height:1.7;">
                이제 Heyso Diary에서 일상을 기록하고, 감정을 정리하고, 나만의 패턴을 확인해 보세요.
            </p>
            <p style="margin:0; font-size:13px; line-height:1.6; color:#6b7280;">
                오늘의 첫 기록부터 가볍게 시작해 보세요.
            </p>
        </td>
    </tr>
</table>
</body>
</html>
